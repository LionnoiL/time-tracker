<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Управління проектом</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm">
                <div class="card-header bg-white pb-0">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">Проект: <span th:text="${project.name}" class="text-primary"></span></h4>
                        <a href="/" class="btn btn-sm btn-outline-secondary">До списку проектів</a>
                    </div>
                    <!-- Вкладки Bootstrap -->
                    <ul class="nav nav-tabs border-bottom-0" id="projectTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="edit-tab" data-bs-toggle="tab" data-bs-target="#edit-pane" type="button" role="tab">
                                <i class="bi bi-pencil-square me-2"></i>Редагування
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="sessions-tab" data-bs-toggle="tab" data-bs-target="#sessions-pane" type="button" role="tab" onclick="loadSessions()">
                                <i class="bi bi-clock-history me-2"></i>Історія сесій
                            </button>
                        </li>
                    </ul>
                </div>
                <div class="card-body">
                    <div class="tab-content" id="projectTabsContent">
                        
                        <!-- Вкладка 1: Редагування -->
                        <div class="tab-pane fade show active" id="edit-pane" role="tabpanel" aria-labelledby="edit-tab">
                            <form th:action="@{/edit/{id}(id=${project.id})}" th:object="${project}" method="post">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Назва проекту</label>
                                    <input type="text" th:field="*{name}" class="form-control" required>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Дедлайн</label>
                                        <input type="date" th:field="*{deadline}" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold" th:text="'Ставка (' + ${userSettings.currency} + '/год)'">
                                            Ставка
                                        </label>
                                        <input type="number" step="0.01" th:field="*{hourlyRate}" class="form-control">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Опис</label>
                                    <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Додайте деталі проекту..."></textarea>
                                </div>

                                <div class="text-end">
                                    <button type="submit" class="btn btn-primary px-4">Зберегти зміни</button>
                                </div>
                            </form>
                        </div>

                        <!-- Вкладка 2: Сесії -->
                        <div class="tab-pane fade" id="sessions-pane" role="tabpanel" aria-labelledby="sessions-tab">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                    <tr>
                                        <th>Початок</th>
                                        <th>Завершення</th>
                                        <th class="text-end">Тривалість</th>
                                    </tr>
                                    </thead>
                                    <tbody id="sessionsTableBody">
                                        <tr>
                                            <td colspan="3" class="text-center py-4">
                                                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                                                Завантаження історії...
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div id="noSessionsMessage" class="text-center py-4 d-none text-muted">
                                <i class="bi bi-info-circle me-1"></i> Сесій поки що немає.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">

    const projectId = [[${project.id}]];
    let sessionsLoaded = false;

    async function loadSessions() {
        if (sessionsLoaded) return;

        try {
            const response = await fetch(`/api/projects/${projectId}/sessions`);
            const sessions = await response.json();
            
            const tbody = document.getElementById('sessionsTableBody');
            const noMsg = document.getElementById('noSessionsMessage');

            if (!sessions || sessions.length === 0) {
                tbody.innerHTML = '';
                noMsg.classList.remove('d-none');
                return;
            }

            noMsg.classList.add('d-none');
            tbody.innerHTML = sessions.map(s => `
                <tr>
                    <td>${new Date(s.startTime).toLocaleString('uk-UA')}</td>
                    <td>${s.endTime ? new Date(s.endTime).toLocaleString('uk-UA') : '<span class="badge bg-success">Зараз у роботі</span>'}</td>
                    <td class="text-end fw-bold">${s.durationMinutes || 0} хв</td>
                </tr>
            `).join('');
            
            sessionsLoaded = true;
        } catch (error) {
            console.error('Помилка завантаження сесій:', error);
            document.getElementById('sessionsTableBody').innerHTML = 
                '<tr><td colspan="3" class="text-center text-danger">Не вдалося завантажити дані</td></tr>';
        }
    }
</script>
</body>
</html>
