<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker - Проекти</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .timer-active {
            color: #dc3545;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        .mw80 {
            min-width: 80px;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="user-profile d-flex align-items-center">
            <img th:if="${#authentication.principal.photoUrl}"
                 th:src="${#authentication.principal.photoUrl}"
                 class="rounded-circle me-2"
                 style="width: 40px; height: 40px; object-fit: cover;"
                 alt="User Photo">
            <span class="fw-bold"
                  th:text="${#authentication.principal.firstName + ' ' + (#authentication.principal.lastName ?: '')}">Им'я користувача</span>
        </div>
        <div>
            <a href="/settings" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-gear"></i> Налаштування
            </a>
            <a href="/logout" class="btn btn-outline-danger btn-sm ms-2">Вихід</a>
        </div>
    </div>

    <h1 class="mb-4">Мої проекти</h1>

    <!-- Дашборд статистики -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-primary text-white">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small fw-bold">Активні</h6>
                    <h2 class="mb-0" id="active-projects-count" th:text="${stats.activeCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-secondary text-white">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small fw-bold">Виконані</h6>
                    <h2 class="mb-0" id="completed-projects-count" th:text="${stats.completedCount}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-success text-white">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small fw-bold">Загальний час</h6>
                    <h2 class="mb-0"><span id="total-hours-display" th:text="${stats.totalHours}">0</span> год</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm border-0 bg-dark text-white">
                <div class="card-body text-center">
                    <h6 class="text-uppercase small fw-bold">Сума не завершених</h6>
                    <h2 class="mb-0">
                        <span id="total-earnings-display" th:text="${stats.totalEarnings}">0</span>
                        <span th:text="${userSettings.currency}">грн</span>
                    </h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/add}" th:object="${newProject}" method="post">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Назва проекту" required>
                    </div>
                    <div class="col-md-3">
                        <input type="date" th:field="*{deadline}" class="form-control"
                               title="Дедлайн">
                    </div>
                    <div class="col-md-3">
                        <div class="input-group">
                            <span class="input-group-text" th:text="${userSettings.currency}">грн</span>
                            <input type="number" step="0.01" th:field="*{hourlyRate}" class="form-control"
                                   placeholder="Плата за годину">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Додати</button>
                    </div>
                    <div class="col-12 mt-2">
                        <textarea th:field="*{description}" class="form-control" rows="2"
                                  placeholder="Опис проекту (необов'язково)"></textarea>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Назва</th>
                    <th>Дедлайн</th>
                    <th>Ставка</th>
                    <th>Час</th>
                    <th>Вартість</th>
                    <th class="text-center">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="ms-2">Дії</span>
                            <a th:href="@{/(showAll=${!showAll})}"
                               th:classappend="${showAll} ? 'btn-light' : 'btn-outline-light'"
                               class="btn btn-sm py-0 px-2 me-1"
                               style="font-size: 0.75rem;"
                               th:title="${showAll} ? 'Приховати завершені' : 'Показати всі'">
                                <span th:text="${showAll} ? 'Сховати завершені' : 'Показати всі'">Показати всі</span>
                            </a>
                        </div>
                    </th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="project : ${projects}">
                    <tr th:id="'project-row-' + ${project.id}"
                        th:data-start-time="${project.startTime}"
                        th:classappend="${project.isCompleted} ? 'table-light text-muted' : ''">
                        <td th:text="${project.id}">1</td>
                        <td class="fw-bold">
                            <span th:text="${project.name}">Проект</span>
                            <button class="btn btn-link btn-sm p-0 ms-1 text-decoration-none"
                                    type="button"
                                    data-bs-toggle="collapse"
                                    th:if="${project.description != null && !project.description.isEmpty()}"
                                    th:data-bs-target="'#desc-' + ${project.id}"
                                    aria-expanded="false"
                                    title="Показати опис">ℹ️
                            </button>
                        </td>
                        <td th:text="${project.deadline != null ? project.deadline : '-'}"
                            th:classappend="${project.deadline != null and project.deadline.isBefore(T(java.time.LocalDate).now())} ? 'text-danger fw-bold' : ''">
                        </td>
                        <td th:text="${(project.hourlyRate != null ? project.hourlyRate : 0) + ' ' + userSettings.currency}"></td>
                        <td>
                                <span class="badge bg-info text-dark mw80">
                                    <span th:id="'display-time-' + ${project.id}"
                                          th:text="${(project.totalMinutes / 60) + 'г ' + (project.totalMinutes % 60) + 'хв'}">0г 0хв</span>
                                        <span class="d-none" th:id="'minutes-' + ${project.id}"
                                              th:text="${project.totalMinutes ?: 0}">0</span>
                                    </span>
                            <button class="btn btn-sm btn-outline-primary ms-1 py-0 px-1"
                                    th:onclick="'addTimeManual(' + ${project.id} + ')'" title="Додати час вручну">+
                            </button>
                        </td>
                        <td>
                                <span class="fw-bold text-success">
                                    <span th:id="'cost-' + ${project.id}"
                                          th:text="${#numbers.formatDecimal(project.getEarnedAmount(), 1, 2)}">0.00
                                    </span>
                                    <span th:text="${userSettings.currency}">грн</span>
                                </span>
                        </td>
                        <td>

                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <button th:classappend="${project.startTime != null} ? 'd-none' : ''"
                                            class="btn btn-success btn-sm mw80"
                                            th:id="'start-btn-' + ${project.id}"
                                            th:onclick="'startTimer(' + ${project.id} + ')'">Старт
                                    </button>
                                    <button th:classappend="${project.startTime == null} ? 'd-none' : ''"
                                            class="btn btn-danger btn-sm mw80"
                                            th:id="'stop-btn-' + ${project.id}"
                                            th:onclick="'stopTimer(' + ${project.id} + ')'">Стоп
                                    </button>
                                    <span th:id="'timer-display-' + ${project.id}"
                                          th:classappend="${project.startTime != null} ? 'timer-active' : ''"
                                          class="ms-2 font-monospace"></span>
                                    </div>
                                    <div th:if="${project.isCompleted}" class="text-success fw-bold small text-uppercase">
                                        Завершено ✅
                                    </div>

                                    <div class="d-flex align-items-center">
                                        <a th:href="@{/edit/{id}(id=${project.id})}"
                                           class="btn btn-outline-primary btn-sm ms-2"
                                           title="Редагувати">
                                            ✏️
                                        </a>
                                        <button th:if="${!project.isCompleted}"
                                                class="btn btn-outline-secondary btn-sm ms-2"
                                                th:onclick="'completeProject(' + ${project.id} + ')'"
                                                title="Завершити проект">
                                            ✅
                                        </button>
                                        <button class="btn btn-outline-danger btn-sm ms-2"
                                                th:onclick="'deleteProject(' + ${project.id} + ')'"
                                                title="Видалити проект">
                                            🗑️
                                        </button>
                                    </div>

                                </div>
                            </td>
                        </tr>
                    <tr class="collapse bg-white" th:id="'desc-' + ${project.id}">
                        <td colspan="7" class="py-3 px-4 border-start border-secondary border-1">
                            <div class="text-muted small fw-bold text-uppercase mb-1">Опис проекту:</div>
                            <div th:text="${project.description != null && !project.description.isEmpty() ? project.description : 'Опис відсутній'}">
                                Зміст опису...
                            </div>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </div>
</div>



    <div class="modal fade" id="universalModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Підтвердження</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMessage"></p>
                    <input type="number" id="modalInput" class="form-control d-none" placeholder="Введіть значення">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
                    <button type="button" class="btn btn-primary" id="modalConfirmBtn">Підтвердити</button>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    const activeTimers = {};

    window.onload = function () {
        bootstrapModal = new bootstrap.Modal(document.getElementById('universalModal'));
        document.querySelectorAll('[data-start-time]').forEach(row => {
            let startTimeStr = row.getAttribute('data-start-time');
            if (startTimeStr && startTimeStr !== "") {
                if (!startTimeStr.includes('Z') && !startTimeStr.includes('+')) {
                    startTimeStr += 'Z';
                }
                const projectId = row.id.replace('project-row-', '');
                startLocalVisualTimer(projectId, new Date(startTimeStr));
            }
        });

        setInterval(syncTimersWithServer, 10000);
    };

    function showConfirm(title, message, isInput = false) {
        return new Promise((resolve) => {
            const modalEl = document.getElementById('universalModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message;

            const input = document.getElementById('modalInput');
            if (isInput) {
                input.classList.remove('d-none');
                input.value = '';
            } else {
                input.classList.add('d-none');
            }

            const confirmBtn = document.getElementById('modalConfirmBtn');

            const newConfirmBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);

            newConfirmBtn.onclick = () => {
                const value = isInput ? input.value : true;
                bootstrapModal.hide();
                resolve(value);
            };

            modalEl.addEventListener('hidden.bs.modal', () => resolve(null), { once: true });
            bootstrapModal.show();
        });
    }

    async function startTimer(projectId) {
        const response = await fetch(`/api/projects/${projectId}/start`, {method: 'PATCH'});
        if (response.ok) {
            await syncTimersWithServer();
            updateDashboard();
        }
    }

    async function stopTimer(projectId) {
        const response = await fetch(`/api/projects/${projectId}/stop`, {method: 'PATCH'});
        if (response.ok) {
            const updatedProject = await response.json();
            stopLocalVisualTimer(projectId, updatedProject);
        }
    }

    function startLocalVisualTimer(projectId, startTime) {
        const display = document.getElementById(`timer-display-${projectId}`);
        const startBtn = document.getElementById(`start-btn-${projectId}`);
        const stopBtn = document.getElementById(`stop-btn-${projectId}`);

        if (startBtn) startBtn.classList.add('d-none');
        if (stopBtn) stopBtn.classList.remove('d-none');
        if (display) {
            display.classList.add('timer-active');
            display.innerText = '00:00';
        }

        activeTimers[projectId] = {
            startTime: startTime,
            intervalId: setInterval(() => {
                const diffSeconds = Math.floor((new Date() - startTime) / 1000);
                const mins = Math.floor(diffSeconds / 60);
                const secs = diffSeconds % 60;
                if (display) {
                    display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000)
        };
    }

    function stopLocalVisualTimer(projectId, updatedProject) {
        stopLocalVisualDisplay(projectId);

        const minutesCell = document.getElementById(`minutes-${projectId}`);
        const displayCell = document.getElementById(`display-time-${projectId}`);
        const costCell = document.getElementById(`cost-${projectId}`);

        if (minutesCell) minutesCell.innerText = updatedProject.totalMinutes;
        if (displayCell) displayCell.innerText = formatMinutes(updatedProject.totalMinutes);
        if (costCell) {
            const earned = (updatedProject.totalMinutes / 60) * (updatedProject.hourlyRate || 0);
            costCell.innerText = earned.toFixed(2);
        }

        updateDashboard();
    }

    function stopLocalVisualDisplay(projectId) {
        if (activeTimers[projectId]) {
            clearInterval(activeTimers[projectId].intervalId);
            delete activeTimers[projectId];
        }
        const display = document.getElementById(`timer-display-${projectId}`);
        const startBtn = document.getElementById(`start-btn-${projectId}`);
        const stopBtn = document.getElementById(`stop-btn-${projectId}`);

        if (startBtn) startBtn.classList.remove('d-none');
        if (stopBtn) stopBtn.classList.add('d-none');
        if (display) {
            display.innerText = '';
            display.classList.remove('timer-active');
        }
    }

    async function syncTimersWithServer() {
        try {
            const response = await fetch('/api/projects');
            if (!response.ok) return;
            const projects = await response.json();

            projects.forEach(project => {
                const isRunningOnServer = project.startTime !== null;
                const isRunningLocally = !!activeTimers[project.id];

                if (!isRunningOnServer && isRunningLocally) {
                    stopLocalVisualTimer(project.id, project);
                } else if (isRunningOnServer && !isRunningLocally) {
                    let startTimeStr = project.startTime;
                    if (!startTimeStr.includes('Z') && !startTimeStr.includes('+')) {
                        startTimeStr += 'Z';
                    }
                    startLocalVisualTimer(project.id, new Date(startTimeStr));
                }
            });
        } catch (e) {
            console.error("Синхронізація не вдалася", e);
        }
    }

    function formatMinutes(totalMinutes) {
        const h = Math.floor(totalMinutes / 60);
        const m = totalMinutes % 60;
        return `${h}г ${m}хв`;
    }

    async function updateDashboard() {
        try {
            const response = await fetch('/api/projects/stats');
            if (response.ok) {
                const stats = await response.json();
                document.getElementById('active-projects-count').innerText = stats.activeCount;
                document.getElementById('completed-projects-count').innerText = stats.completedCount;
                document.getElementById('total-hours-display').innerText = stats.totalHours;
                document.getElementById('total-earnings-display').innerText = stats.totalEarnings;
            }
        } catch (error) {
            console.error('Статистика не оновлена:', error);
        }
    }

    async function deleteProject(projectId) {
        const confirmed = await showConfirm('Видалення', 'Ви впевнені, що хочете ПОВНІСТЮ ВИДАЛИТИ цей проект? Цю дію неможливо скасувати.');
        if (!confirmed) return;
        try {
            const response = await fetch(`/api/projects/${projectId}`, {method: 'DELETE'});
            if (response.ok) {
                document.getElementById(`project-row-${projectId}`)?.remove();
                document.getElementById(`desc-${projectId}`)?.remove();
                updateDashboard();
            }
        } catch (error) {
            console.error('Помилка видалення:', error);
        }
    }

    async function completeProject(projectId) {
        const confirmed = await showConfirm('Завершення', 'Ви впевнені, що хочете позначити цей проект як завершений?');
        if (!confirmed) return;
        try {
            const response = await fetch(`/api/projects/${projectId}/complete`, {method: 'PATCH'});
            if (response.ok) {
                if (window.location.search.includes('showAll=true')) {
                    location.reload();
                } else {
                    document.getElementById(`project-row-${projectId}`)?.remove();
                    document.getElementById(`desc-${projectId}`)?.remove();
                }
                updateDashboard();
            }
        } catch (error) {
            console.error('Помилка завершення проекту:', error);
        }
    }

    async function addTimeManual(projectId) {
        const input = await showConfirm('Додати час', 'Введіть кількість хвилин:', true);
        const minutes = parseInt(input);
        if (isNaN(minutes) || minutes <= 0) return;

        try {
            const response = await fetch(`/api/projects/${projectId}/add-time`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({minutes: minutes})
            });
            if (response.ok) {
                const updated = await response.json();
                stopLocalVisualTimer(projectId, updated);
            }
        } catch (error) {
            console.error('Помилка ручного вводу:', error);
        }
    }

</script>
</body>
</html>
