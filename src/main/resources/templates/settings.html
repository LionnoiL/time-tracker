<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Налаштування профілю</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/settings}" th:object="${settings}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Валюта (напр. USD, EUR, UAH)</label>
                            <input type="text" th:field="*{currency}" class="form-control" placeholder="USD">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ставка по-замовчуванню (за годину)</label>
                            <input type="number" step="0.01" th:field="*{defaultHourlyRate}" class="form-control">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="/" class="btn btn-secondary">Назад</a>
                            <button type="submit" class="btn btn-success">Зберегти</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
