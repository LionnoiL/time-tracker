services:
  db:
    image: postgres:15
    container_name: timetracker-db
    environment:
      POSTGRES_DB: timetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/timetrackerdata

volumes:
  postgres_data:
